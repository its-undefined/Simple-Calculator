<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <script type="module" src="script.js"></script>
  <title>Simple Calculator</title>
</head>

<body>
  <main>
    <h1>Simple Calculator</h1>
    <h2 id="textOutput" class="textOutput">0</h2>

    <div class="buttonPanel">
      <div class="row-1">
        <button id="sevenButton" name="numberButton" value="7">7</button>
        <button id="eightButton" name="numberButton" value="8">8</button>
        <button id="nineButton" name="numberButton" value="9">9</button>
      </div>

      <div class="row-2">
        <button id="fourButton" name="numberButton" value="4">4</button>
        <button id="fiveButton" name="numberButton" value="5">5</button>
        <button id="sixButton" name="numberButton" value="6">6</button>
      </div>

      <div class="row-3">
        <button id="oneButton" name="numberButton" value="1">1</button>
        <button id="twoButton" name="numberButton" value="2">2</button>
        <button id="threeButton" name="numberButton" value="3">3</button>
      </div>

      <div class="row-4">
        <button id="zeroButton" name="numberButton" value="0">0</button>
        <button id="backspaceButton">⌫</button>
      </div>
    </div>
  </main>
</body>

</html>
